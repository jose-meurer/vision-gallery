spring:
  application:
    name: visiongallery
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 15MB
  cloud:
    azure:
      storage:
        blob:
          endpoint: ${AZURE_STORAGE_ENDPOINT}
          connection-string: ${AZURE_STORAGE_CONNECTION_STRING}
      cosmos:
        endpoint: ${AZURE_COSMOS_ENDPOINT}
        key: ${AZURE_COSMOS_KEY}
        database: ${AZURE_COSMOS_DATABASE}
        populate-query-metrics: true
      keyvault:
        secret:
          enabled: false
server:
  port: 8081
  servlet:
    context-path: /api
azure:
  storage:
    container:
      name: upload-images